networks:
  laravel_network_station:

services:
  server:
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - postgres
    container_name: laravel_server
    networks:
      - laravel_network_station

  php:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html:delegated
    container_name: laravel_php
    networks:
      - laravel_network_station
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    tty: true
    container_name: laravel_postgres
    environment:
      POSTGRES_DB: maosa_prime_clients
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "^0BmjiTE3i1^@)=&&^h^"
    ports:
      - "5432:5432"
    networks:
      - laravel_network_station
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: laravel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel_network_station
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    container_name: laravel_pgadmin
    depends_on:
      - postgres
    ports:
      - "8090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: maosa@admin.com
      PGADMIN_DEFAULT_PASSWORD: maosa_admin
    networks:
      - laravel_network_station

  composer:
    build:
      context: .
      dockerfile: dockerfiles/composer.dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      - php
    networks:
      - laravel_network_station

  artisan:
    build:
      context: .
      dockerfile: dockerfiles/php.dockerfile
    volumes:
      - ./src:/var/www/html
    entrypoint: [ "php", "/var/www/html/artisan", "serve", "--host=0.0.0.0" ]
    networks:
      - laravel_network_station

  node:
    image: node:18-alpine
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    environment:
      - VITE_HOST=0.0.0.0
    command: npm run dev -- --host
    networks:
      - laravel_network_station

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local